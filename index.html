/* ═══════════════════════════════════════════════
   Main App Component
   ═══════════════════════════════════════════════ */
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [products, setProducts] = useState(DEMO_PRODUCTS);
  const [deals, setDeals] = useState([]);
  const [dealLines, setDealLines] = useState({});
  const [config, setConfig] = useState(DEMO_CONFIG);
  const [toast, setToast] = useState(null);
  const [dataSource, setDataSource] = useState('demo'); // 'demo' or 'sheets'

  // Recompute deal line calculations
  const computedDealLines = useMemo(() => {
    const result = {};
    for (const [dealId, lines] of Object.entries(dealLines)) {
      result[dealId] = lines.map(line => {
        const product = products.find(p => p.sku === line.sku);
        return Calculator.computeLine(line, product);
      });
    }
    return result;
  }, [dealLines, products]);

  // Recompute deal totals
  const computedDeals = useMemo(() => {
    return deals.map(deal => {
      const lines = computedDealLines[deal.id] || [];
      const totals = Calculator.computeDealTotals(lines);
      return { ...deal, ...totals };
    });
  }, [deals, computedDealLines]);

  // Restore session
  useEffect(() => {
    const saved = sessionStorage.getItem('df_user');
    if (saved) {
      try { setUser(JSON.parse(saved)); } catch(e) {}
    }
  }, []);

  // Load from Google Sheets on mount + auto-refresh every 30 seconds
  useEffect(() => {
    if (CONFIG.PUB_BASE) {
      loadFromSheets();
    }
  }, []);

  useEffect(() => {
    if (!CONFIG.APPS_SCRIPT_URL || !user) return;
    const interval = setInterval(() => {
      refreshFromSheet();
    }, 30000);
    return () => clearInterval(interval);
  }, [user]);

  async function loadFromSheets() {
    try {
      // ── 1. Products via published CSV (cached OK — product data rarely changes) ──
      const prodRes = await new Promise((resolve, reject) => {
        Papa.parse(CONFIG.getSheetUrl(CONFIG.GID_PRODUCTS), {
          download: true, header: true, complete: resolve, error: reject
        });
      });
      if (prodRes.data && prodRes.data.length > 0) {
        const parsed = prodRes.data.map(r => ({
          sku: r['SKU'] || r['sku'] || '',
          name: r['Product Name'] || r['name'] || '',
          landedCost: parseFloat(r['Landed Cost (€)'] || r['landedCost']) || 0,
          listPrice: parseFloat(r['List Price (€)'] || r['listPrice']) || 0,
          maxSOA: parseFloat(r['Max SOA (€)'] || r['maxSOA']) || 0,
          defaultNetPrice: parseFloat(r['Default Net Price (€)'] || r['defaultNetPrice']) || 0,
        })).filter(p => p.sku);
        if (parsed.length > 0) setProducts(parsed);
      }

      // ── 2. Deals, Lines, Users, Config via Apps Script (real-time, no cache) ──
      if (CONFIG.APPS_SCRIPT_URL) {
        const res = await fetch(CONFIG.APPS_SCRIPT_URL + '?action=getData');
        const data = await res.json();

        if (data.success) {
          // Sheet is source of truth — use sheet data directly
          if (data.deals) {
            setDeals(data.deals);
            saveLocal('deals', data.deals);
          }

          // Deal Lines
          if (data.dealLines) {
            setDealLines(data.dealLines);
            saveLocal('dealLines', data.dealLines);
          }

          // Users
          if (data.users && data.users.length > 0) {
            window._sheetUsers = data.users;
          }

          // Config (countries + retailers)
          if (data.config && data.config.countries && data.config.countries.length > 0) {
            setConfig(data.config);
          }
        }
      }

      setDataSource('sheets');
    } catch(e) {
      // Fallback: try localStorage
      const localDeals = loadLocal('deals');
      const localLines = loadLocal('dealLines');
      if (localDeals && localDeals.length > 0) {
        setDeals(localDeals);
        setDealLines(localLines || {});
        setDataSource('sheets');
      }
      console.log('Sheet load error, using local fallback:', e);
    }
  }

  // Silent background refresh — updates deals/lines from sheet without full reload
  async function refreshFromSheet() {
    try {
      const res = await fetch(CONFIG.APPS_SCRIPT_URL + '?action=getData');
      const data = await res.json();
      if (data.success) {
        if (data.deals) { setDeals(data.deals); saveLocal('deals', data.deals); }
        if (data.dealLines) { setDealLines(data.dealLines); saveLocal('dealLines', data.dealLines); }
      }
    } catch(e) { /* silent fail — next poll will retry */ }
  }

  function showToast(message, type = 'info') {
    setToast({ message, type });
    setTimeout(() => setToast(null), 3000);
  }

  function handleLogin(u) {
    setUser(u);
    sessionStorage.setItem('df_user', JSON.stringify(u));
  }

  function handleLogout() {
    setUser(null);
    sessionStorage.removeItem('df_user');
    setPage('dashboard');
  }

  // ── localStorage persistence (bridges CSV cache delay) ──
  function saveLocal(key, data) {
    try { localStorage.setItem('df_' + key, JSON.stringify(data)); } catch(e) {}
  }
  function loadLocal(key) {
    try { const d = localStorage.getItem('df_' + key); return d ? JSON.parse(d) : null; } catch(e) { return null; }
  }

  // Persist deals & lines whenever they change
  useEffect(() => { if (deals.length > 0 || dataSource === 'sheets') saveLocal('deals', deals); }, [deals]);
  useEffect(() => { if (Object.keys(dealLines).length > 0 || dataSource === 'sheets') saveLocal('dealLines', dealLines); }, [dealLines]);

  async function addDeal(deal, lines) {
    if (CONFIG.APPS_SCRIPT_URL) {
      const result = await writeDealToSheet(deal, lines);
      if (!result.success) {
        showToast('Failed to save deal: ' + result.error, 'error');
        return false;
      }
    }
    setDeals(prev => {
      const next = [deal, ...prev];
      saveLocal('deals', next);
      return next;
    });
    setDealLines(prev => {
      const next = { ...prev, [deal.id]: lines };
      saveLocal('dealLines', next);
      return next;
    });
    showToast('Deal created successfully', 'success');
    return true;
  }

  async function updateDealStatus(dealId, newStatus, reason = '') {
    if (CONFIG.APPS_SCRIPT_URL) {
      const deal = deals.find(d => d.id === dealId);
      writeAuditLog(dealId, 'status_change', user.displayName, deal ? deal.status : '', newStatus, reason);
      const result = await writeDealStatusToSheet(dealId, newStatus, user.displayName, reason);
      if (!result.success) {
        showToast('Failed to update status: ' + result.error, 'error');
        return;
      }
    }
    setDeals(prev => {
      const next = prev.map(d => {
        if (d.id !== dealId) return d;
        const updates = {
          ...d,
          status: newStatus,
          approvedBy: (newStatus === CONFIG.STATUS.APPROVED || newStatus === CONFIG.STATUS.REJECTED) ? user.displayName : d.approvedBy,
          approvalDate: (newStatus === CONFIG.STATUS.APPROVED || newStatus === CONFIG.STATUS.REJECTED) ? new Date().toISOString().split('T')[0] : d.approvalDate,
          notes: reason || d.notes,
        };
        // Calculate claim deadline on approval
        if (newStatus === CONFIG.STATUS.APPROVED && d.periodEnd) {
          const deadline = new Date(d.periodEnd);
          deadline.setDate(deadline.getDate() + CONFIG.CLAIM_DEADLINE_WEEKS * 7);
          updates.claimDeadline = deadline.toISOString().split('T')[0];
        }
        return updates;
      });
      saveLocal('deals', next);
      return next;
    });
    showToast(`Deal ${newStatus.toLowerCase()}`, newStatus === CONFIG.STATUS.REJECTED ? 'error' : 'success');
  }

  async function settleDeal(dealId, notes = '') {
    if (CONFIG.APPS_SCRIPT_URL) {
      const result = await writeSettleDeal(dealId, notes);
      if (!result.success) {
        showToast('Failed to settle deal: ' + result.error, 'error');
        return;
      }
    }
    setDeals(prev => {
      const next = prev.map(d => {
        if (d.id !== dealId) return d;
        return {
          ...d,
          status: CONFIG.STATUS.SETTLED,
          settlementDate: new Date().toISOString().split('T')[0],
          settlementNotes: notes,
        };
      });
      saveLocal('deals', next);
      return next;
    });
    showToast('Deal settled', 'success');
  }

  async function writeSettleDeal(dealId, notes) {
    try {
      const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'settleDeal', dealId, notes, user: user.displayName }),
      });
      const data = await res.json();
      if (!data.success) return { success: false, error: data.error || 'Settle write failed' };
      refreshFromSheet();
      return { success: true };
    } catch(e) { console.error('Settle write failed:', e); return { success: false, error: e.message }; }
  }

  async function writeDealToSheet(deal, lines) {
    try {
      const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'addDeal', deal, lines }),
      });
      const data = await res.json();
      if (!data.success) return { success: false, error: data.error || 'Sheet write failed' };
      refreshFromSheet();
      return { success: true };
    } catch(e) { console.error('Sheet write failed:', e); return { success: false, error: e.message }; }
  }

  async function writeDealStatusToSheet(dealId, newStatus, approvedBy, reason) {
    try {
      const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'updateDealStatus', dealId, newStatus, approvedBy, reason }),
      });
      const data = await res.json();
      if (!data.success) return { success: false, error: data.error || 'Status update failed' };
      refreshFromSheet();
      return { success: true };
    } catch(e) { console.error('Status update write failed:', e); return { success: false, error: e.message }; }
  }

  async function writeAuditLog(dealId, action, usr, oldStatus, newStatus, notes) {
    try {
      const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'auditLog', dealId, logAction: action, user: usr, oldStatus, newStatus, notes }),
      });
      const data = await res.json();
      if (!data.success) return { success: false, error: data.error || 'Audit log failed' };
      return { success: true };
    } catch(e) { console.error('Audit log write failed:', e); return { success: false, error: e.message }; }
  }

  const isHQ = user && user.role === 'hq';

  const navItems = [
    { id: 'dashboard', label: 'Dashboard' },
    { id: 'newdeal', label: 'New Deal' },
    { id: 'mydeals', label: 'My Deals' },
    ...(isHQ ? [{ id: 'alldeals', label: 'All Deals' }] : []),
    { id: 'products', label: 'Products' },
  ];

  if (!user) {
    return <LoginScreen onLogin={handleLogin} users={DEMO_USERS} />;
  }

  return (
    <div>
      {/* Header */}
      <div className="header">
        <div className="header-left">
          <div className="header-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
            <span>Deal Framework</span>
          </div>
          <nav className="nav">
            {navItems.map(item => (
              <div key={item.id} className={`nav-item ${page === item.id ? 'active' : ''}`} onClick={() => setPage(item.id)}>
                {item.label}
              </div>
            ))}
          </nav>
        </div>
        <div className="header-right">
          <div className="user-badge">
            {user.displayName}
            <span className="role">{user.role}</span>
          </div>
          <button className="logout-btn" onClick={handleLogout}>Logout</button>
        </div>
      </div>

      {/* Content */}
      <div className="main">
        {dataSource === 'demo' && (
          <div style={{ background: '#fef3c7', border: '1px solid #f59e0b', borderRadius: 8, padding: '10px 16px', marginBottom: 20, fontSize: 13, color: '#92400e', display: 'flex', alignItems: 'center', gap: 8 }}>
            <strong>Demo Mode</strong> — Using sample data. Connect Google Sheets for live data (see README).
          </div>
        )}

        {page === 'dashboard' && <DashboardPage deals={computedDeals} dealLines={computedDealLines} user={user} isHQ={isHQ} setPage={setPage} />}
        {page === 'newdeal' && <NewDealPage products={products} config={config} user={user} onSubmit={addDeal} onComplete={() => setPage('mydeals')} isHQ={isHQ} />}
        {page === 'mydeals' && <MyDealsPage deals={computedDeals} dealLines={computedDealLines} user={user} products={products} isHQ={isHQ} />}
        {page === 'alldeals' && isHQ && <AllDealsPage deals={computedDeals} dealLines={computedDealLines} user={user} products={products} onStatusChange={updateDealStatus} onSettle={settleDeal} />}
        {page === 'products' && <ProductsPage products={products} isHQ={isHQ} />}
      </div>

      {/* Toast */}
      {toast && <div className={`toast ${toast.type}`}>{toast.message}</div>}
    </div>
  );
}


/* ═══════════════════════════════════════════════
   Login Screen
   ═══════════════════════════════════════════════ */
function LoginScreen({ onLogin, users }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      if (CONFIG.APPS_SCRIPT_URL) {
        // Server-side authentication — passwords never leave the server
        const res = await fetch(CONFIG.APPS_SCRIPT_URL + '?action=authenticate&username=' +
          encodeURIComponent(username.toLowerCase()) + '&password=' + encodeURIComponent(password));
        const data = await res.json();
        if (data.success) {
          onLogin(data.user);
          setLoading(false);
          return;
        } else {
          setError('Invalid username or password');
          setLoading(false);
          return;
        }
      }
    } catch(err) {
      // Apps Script unreachable — fall through to demo users
    }
    // Offline/demo fallback — only checks built-in demo users
    const u = users.find(u => u.username === username.toLowerCase() && u.password === password && u.active);
    if (u) {
      onLogin({ username: u.username, role: u.role, displayName: u.displayName, country: u.country });
    } else {
      setError('Invalid username or password');
    }
    setLoading(false);
  }

  return (
    <div className="login-overlay">
      <div className="login-card">
        <div className="logo-text">HOMBLI</div>
        <h1>Deal Framework</h1>
        <p>Deal Planning & Commission Management</p>
        <form onSubmit={handleSubmit}>
          <div className="login-field">
            <label>Username</label>
            <input type="text" value={username} onChange={e => setUsername(e.target.value)} placeholder="Enter username" autoFocus disabled={loading} />
          </div>
          <div className="login-field">
            <label>Password</label>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Enter password" disabled={loading} />
          </div>
          <button type="submit" className="login-btn" disabled={loading}>{loading ? 'Signing in...' : 'Sign In'}</button>
        </form>
        {error && <div className="login-error">{error}</div>}
        <div style={{ marginTop: 24, fontSize: 12, color: '#94a3b8' }}>
          Demo: admin/admin (HQ) · marco/marco · anna/anna · demo/demo
        </div>
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════
   Dashboard Page
   ═══════════════════════════════════════════════ */
function DashboardPage({ deals, dealLines, user, isHQ, setPage }) {
  const chartRef1 = useRef(null);
  const chartRef2 = useRef(null);
  const chartRef3 = useRef(null);
  const chartRef4 = useRef(null);
  const chartInstances = useRef({});

  const visibleDeals = isHQ ? deals : deals.filter(d => d.agent === user.displayName);
  const activeDeals = visibleDeals.filter(d => ['Draft', 'Approved', 'Live', 'Completed', 'Claim Received'].includes(d.status));
  const totalSOA = activeDeals.reduce((s, d) => s + (d.totalSOA || 0), 0);
  const totalCommission = activeDeals.reduce((s, d) => s + (d.totalCommission || 0), 0);
  const totalRevenue = activeDeals.reduce((s, d) => s + (d.totalRevenue || 0), 0);
  const avgMargin = totalRevenue > 0 ? activeDeals.reduce((s, d) => s + (d.avgMargin || 0) * (d.totalRevenue || 0), 0) / totalRevenue : 0;

  // Filters
  const [filterCountry, setFilterCountry] = useState('');
  const [filterAgent, setFilterAgent] = useState('');
  const [filterStatus, setFilterStatus] = useState('');

  const filteredDeals = visibleDeals.filter(d => {
    if (filterCountry && d.country !== filterCountry) return false;
    if (filterAgent && d.agent !== filterAgent) return false;
    if (filterStatus && d.status !== filterStatus) return false;
    return true;
  });

  const countries = [...new Set(visibleDeals.map(d => d.country))];
  const agents = [...new Set(visibleDeals.map(d => d.agent))];

  useEffect(() => {
    // Destroy previous charts
    Object.values(chartInstances.current).forEach(c => c.destroy());
    chartInstances.current = {};

    // SOA by Retailer
    if (chartRef1.current) {
      const byRetailer = {};
      filteredDeals.filter(d => ['Draft', 'Approved', 'Live'].includes(d.status)).forEach(d => {
        byRetailer[d.retailer] = (byRetailer[d.retailer] || 0) + (d.totalSOA || 0);
      });
      chartInstances.current.c1 = new Chart(chartRef1.current, {
        type: 'bar',
        data: {
          labels: Object.keys(byRetailer),
          datasets: [{ label: 'SOA Exposure (€)', data: Object.values(byRetailer), backgroundColor: '#3b82f6' }],
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } },
      });
    }

    // Commission by Agent
    if (chartRef2.current) {
      const byAgent = {};
      filteredDeals.filter(d => ['Draft', 'Approved', 'Live'].includes(d.status)).forEach(d => {
        byAgent[d.agent] = (byAgent[d.agent] || 0) + (d.totalCommission || 0);
      });
      chartInstances.current.c2 = new Chart(chartRef2.current, {
        type: 'bar',
        data: {
          labels: Object.keys(byAgent),
          datasets: [{ label: 'Commission (€)', data: Object.values(byAgent), backgroundColor: '#8b5cf6' }],
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } },
      });
    }

    // Deals by Status
    if (chartRef3.current) {
      const byStatus = {};
      filteredDeals.forEach(d => { byStatus[d.status] = (byStatus[d.status] || 0) + 1; });
      const statusColors = { Draft: '#94a3b8', Approved: '#3b82f6', Live: '#22c55e', Completed: '#334155', Rejected: '#ef4444', 'Claim Received': '#f59e0b', Settled: '#065f46' };
      chartInstances.current.c3 = new Chart(chartRef3.current, {
        type: 'doughnut',
        data: {
          labels: Object.keys(byStatus),
          datasets: [{ data: Object.values(byStatus), backgroundColor: Object.keys(byStatus).map(s => statusColors[s] || '#94a3b8') }],
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } } },
      });
    }

    // Margin Distribution
    if (chartRef4.current) {
      const buckets = { '<20%': 0, '20-25%': 0, '25-30%': 0, '30-35%': 0, '35-40%': 0, '>40%': 0 };
      filteredDeals.forEach(d => {
        const m = (d.avgMargin || 0) * 100;
        if (m < 20) buckets['<20%']++;
        else if (m < 25) buckets['20-25%']++;
        else if (m < 30) buckets['25-30%']++;
        else if (m < 35) buckets['30-35%']++;
        else if (m < 40) buckets['35-40%']++;
        else buckets['>40%']++;
      });
      chartInstances.current.c4 = new Chart(chartRef4.current, {
        type: 'bar',
        data: {
          labels: Object.keys(buckets),
          datasets: [{ label: 'Deals', data: Object.values(buckets), backgroundColor: ['#ef4444', '#f97316', '#eab308', '#22c55e', '#14b8a6', '#06b6d4'] }],
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } },
      });
    }

    return () => { Object.values(chartInstances.current).forEach(c => c.destroy()); };
  }, [filteredDeals]);

  // Finance / Accrual view: group active deals by month
  const financeData = useMemo(() => {
    const months = {};
    activeDeals.forEach(d => {
      const start = d.periodStart ? d.periodStart.substring(0, 7) : 'Unknown';
      if (!months[start]) months[start] = { soa: 0, commission: 0, revenue: 0, deals: 0 };
      months[start].soa += d.totalSOA || 0;
      months[start].commission += d.totalCommission || 0;
      months[start].revenue += d.totalRevenue || 0;
      months[start].deals += 1;
    });
    return Object.entries(months).sort(([a], [b]) => a.localeCompare(b));
  }, [activeDeals]);

  function exportDashboard() {
    const rows = filteredDeals.map(d => ({
      'Deal ID': d.id, Agent: d.agent, Country: d.country, Retailer: d.retailer,
      'Period Start': d.periodStart, 'Period End': d.periodEnd, Status: d.status,
      'Total SOA (€)': (d.totalSOA || 0).toFixed(2),
      'Total Commission (€)': (d.totalCommission || 0).toFixed(2),
      'Total Revenue (€)': (d.totalRevenue || 0).toFixed(2),
      'Avg Margin %': ((d.avgMargin || 0) * 100).toFixed(1) + '%',
      'Created': d.createdDate, 'Approved By': d.approvedBy || '',
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Deals');
    // Add finance sheet
    if (financeData.length > 0) {
      const finRows = financeData.map(([month, d]) => ({
        Month: month, 'SOA Liability (€)': d.soa.toFixed(2), 'Commission Liability (€)': d.commission.toFixed(2),
        'Revenue (€)': d.revenue.toFixed(2), Deals: d.deals,
      }));
      const ws2 = XLSX.utils.json_to_sheet(finRows);
      XLSX.utils.book_append_sheet(wb, ws2, 'Finance Accrual');
    }
    XLSX.writeFile(wb, `deal-framework-export-${new Date().toISOString().split('T')[0]}.xlsx`);
  }

  return (
    <div>
      {/* KPIs */}
      <div className="kpi-grid">
        <div className="kpi-card accent">
          <div className="kpi-label">SOA Exposure</div>
          <div className="kpi-value">{fmt.eur(totalSOA)}</div>
          <div className="kpi-sub">{activeDeals.length} active deals</div>
        </div>
        <div className="kpi-card warning">
          <div className="kpi-label">Commission Liability</div>
          <div className="kpi-value">{fmt.eur(totalCommission)}</div>
          <div className="kpi-sub">Pending + approved</div>
        </div>
        <div className="kpi-card success">
          <div className="kpi-label">Total Revenue</div>
          <div className="kpi-value">{fmt.eur(totalRevenue)}</div>
          <div className="kpi-sub">Active deals</div>
        </div>
        <div className="kpi-card" style={{ borderLeft: avgMargin < 0.25 ? '4px solid var(--danger)' : '4px solid var(--success)' }}>
          <div className="kpi-label">Avg Margin</div>
          <div className="kpi-value">{fmt.pct(avgMargin)}</div>
          <div className="kpi-sub">{avgMargin < 0.25 ? 'Below target' : 'Healthy'}</div>
        </div>
      </div>

      {/* Claim KPIs (HQ only) */}
      {isHQ && (() => {
        const completedDeals = visibleDeals.filter(d => d.status === 'Completed');
        const pendingClaims = completedDeals.filter(d => !isDealOverdue(d));
        const overdueClaims = completedDeals.filter(d => isDealOverdue(d));
        const claimReceivedDeals = visibleDeals.filter(d => d.status === 'Claim Received');
        const settledDeals = visibleDeals.filter(d => d.status === 'Settled');
        const plannedSOAAll = [...claimReceivedDeals, ...settledDeals].reduce((s, d) => s + (d.totalSOA || 0), 0);
        const actualSOAAll = [...claimReceivedDeals, ...settledDeals].reduce((s, d) => s + (d.actualSOA || 0), 0);
        const claimRatio = plannedSOAAll > 0 ? (actualSOAAll / plannedSOAAll * 100).toFixed(1) : '—';
        return (
          <div className="kpi-grid" style={{ marginTop: 0 }}>
            <div className="kpi-card warning">
              <div className="kpi-label">Pending Claims</div>
              <div className="kpi-value">{pendingClaims.length}</div>
              <div className="kpi-sub">Completed, awaiting retailer claim</div>
            </div>
            <div className="kpi-card danger">
              <div className="kpi-label">Overdue Claims</div>
              <div className="kpi-value">{overdueClaims.length}</div>
              <div className="kpi-sub">Past 12-week deadline</div>
            </div>
            <div className="kpi-card" style={{ borderLeft: '4px solid var(--info)' }}>
              <div className="kpi-label">Claimed vs Planned SOA</div>
              <div className="kpi-value" style={{ color: 'var(--info)' }}>{claimRatio}{claimRatio !== '—' ? '%' : ''}</div>
              <div className="kpi-sub">{fmt.eur(actualSOAAll)} of {fmt.eur(plannedSOAAll)}</div>
            </div>
          </div>
        );
      })()}

      {/* Filters */}
      <div className="filter-bar">
        {isHQ && (
          <div className="form-group">
            <label>Country</label>
            <select className="form-select" value={filterCountry} onChange={e => setFilterCountry(e.target.value)}>
              <option value="">All countries</option>
              {countries.map(c => <option key={c}>{c}</option>)}
            </select>
          </div>
        )}
        {isHQ && (
          <div className="form-group">
            <label>Agent</label>
            <select className="form-select" value={filterAgent} onChange={e => setFilterAgent(e.target.value)}>
              <option value="">All agents</option>
              {agents.map(a => <option key={a}>{a}</option>)}
            </select>
          </div>
        )}
        <div className="form-group">
          <label>Status</label>
          <select className="form-select" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
            <option value="">All statuses</option>
            {Object.values(CONFIG.STATUS).map(s => <option key={s}>{s}</option>)}
          </select>
        </div>
        <div className="form-group" style={{ marginLeft: 'auto' }}>
          <label>&nbsp;</label>
          <button className="btn btn-outline" onClick={exportDashboard}>Export to Excel</button>
        </div>
      </div>

      {/* Charts */}
      <div className="chart-grid">
        <div className="chart-card">
          <h3>SOA Exposure by Retailer</h3>
          <div style={{ height: 220 }}><canvas ref={chartRef1}></canvas></div>
        </div>
        <div className="chart-card">
          <h3>Commission by Agent</h3>
          <div style={{ height: 220 }}><canvas ref={chartRef2}></canvas></div>
        </div>
        <div className="chart-card">
          <h3>Deals by Status</h3>
          <div style={{ height: 220 }}><canvas ref={chartRef3}></canvas></div>
        </div>
        <div className="chart-card">
          <h3>Margin Distribution</h3>
          <div style={{ height: 220 }}><canvas ref={chartRef4}></canvas></div>
        </div>
      </div>

      {/* Finance / Accrual Table */}
      {isHQ && financeData.length > 0 && (
        <div className="card">
          <div className="card-header">
            <div>
              <div className="card-title">Finance & Accrual Overview</div>
              <div className="card-subtitle">Upcoming SOA + commission liabilities by period</div>
            </div>
          </div>
          <div className="table-wrap">
            <table className="finance-table">
              <thead>
                <tr><th>Period</th><th>Deals</th><th>SOA Liability</th><th>Commission Liability</th><th>Revenue</th></tr>
              </thead>
              <tbody>
                {financeData.map(([month, d]) => (
                  <tr key={month}>
                    <td>{month}</td><td>{d.deals}</td><td>{fmt.eur(d.soa)}</td><td>{fmt.eur(d.commission)}</td><td>{fmt.eur(d.revenue)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Claim Deadline Tracker (HQ only) */}
      {isHQ && (() => {
        const trackableDeals = visibleDeals.filter(d =>
          ['Approved', 'Live', 'Completed'].includes(d.status) && (d.claimDeadline || d.periodEnd)
        ).map(d => {
          const days = daysUntilDeadline(d);
          return { ...d, _daysLeft: days };
        }).sort((a, b) => (a._daysLeft || 999) - (b._daysLeft || 999));

        if (trackableDeals.length === 0) return null;
        return (
          <div className="card">
            <div className="card-header">
              <div>
                <div className="card-title">Claim Deadlines</div>
                <div className="card-subtitle">Upcoming claim deadlines — most urgent first</div>
              </div>
            </div>
            <div className="table-wrap">
              <table>
                <thead>
                  <tr><th>Deal ID</th><th>Retailer</th><th>Agent</th><th>Period End</th><th>Claim Deadline</th><th>Days Left</th><th>Status</th></tr>
                </thead>
                <tbody>
                  {trackableDeals.slice(0, 15).map(d => {
                    const days = d._daysLeft;
                    const color = days === null ? 'inherit' : days < 0 ? 'var(--danger)' : days <= 7 ? 'var(--danger)' : days <= 30 ? 'var(--warning)' : 'var(--success)';
                    return (
                      <tr key={d.id}>
                        <td style={{ fontFamily: 'monospace', fontSize: 12 }}>{d.id}</td>
                        <td>{d.retailer}</td>
                        <td>{d.agent}</td>
                        <td style={{ fontSize: 12 }}>{fmt.date(d.periodEnd)}</td>
                        <td style={{ fontSize: 12 }}>{fmt.date(getClaimDeadline(d))}</td>
                        <td style={{ fontWeight: 700, color }}>{days !== null ? (days < 0 ? days + ' (overdue)' : days + 'd') : '—'}</td>
                        <td><StatusBadge status={d.status} overdue={d.status === 'Completed' && days !== null && days < 0} /></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })()}

      {/* Recent Deals */}
      <div className="card">
        <div className="card-header">
          <div>
            <div className="card-title">Recent Deals</div>
            <div className="card-subtitle">Last 10 deals</div>
          </div>
          <button className="btn btn-primary btn-sm" onClick={() => setPage('newdeal')}>+ New Deal</button>
        </div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Deal ID</th><th>Agent</th><th>Retailer</th><th>Period</th>
                <th>Status</th><th>SOA</th><th>Commission</th><th>Revenue</th><th>Margin</th>
              </tr>
            </thead>
            <tbody>
              {filteredDeals.slice(0, 10).map(d => (
                <tr key={d.id}>
                  <td style={{ fontFamily: 'monospace', fontSize: 12 }}>{d.id}</td>
                  <td>{d.agent}</td>
                  <td>{d.retailer}</td>
                  <td style={{ fontSize: 12 }}>{fmt.date(d.periodStart)} — {fmt.date(d.periodEnd)}</td>
                  <td><StatusBadge status={d.status} overdue={isDealOverdue(d)} /></td>
                  <td>{fmt.eur(d.totalSOA)}</td>
                  <td>{fmt.eur(d.totalCommission)}</td>
                  <td>{fmt.eur(d.totalRevenue)}</td>
                  <td>{fmt.pct(d.avgMargin)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {filteredDeals.length === 0 && (
          <div className="empty-state">
            <h3>No deals found</h3>
            <p>Create your first deal to get started.</p>
          </div>
        )}
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════
   New Deal Page — Multi-Step Form
   ═══════════════════════════════════════════════ */
function NewDealPage({ products, config, user, onSubmit, onComplete, isHQ }) {
  const [step, setStep] = useState(1);
  const [dealInfo, setDealInfo] = useState({
    country: config.countries[0] || '',
    retailer: '',
    periodStart: '',
    periodEnd: '',
    notes: '',
  });
  const [lines, setLines] = useState([]);
  const [searchTerm, setSearchTerm] = useState('');
  const [showDropdown, setShowDropdown] = useState(false);

  const filteredProducts = products.filter(p =>
    p.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
    p.sku.toLowerCase().includes(searchTerm.toLowerCase())
  );

  const retailers = config.retailers[dealInfo.country] || [];

  // Compute all lines
  const computedLines = lines.map(line => {
    const product = products.find(p => p.sku === line.sku);
    return Calculator.computeLine(line, product);
  });
  const totals = Calculator.computeDealTotals(computedLines);

  function addProductLine(product) {
    if (lines.find(l => l.sku === product.sku)) return;
    setLines(prev => [...prev, {
      sku: product.sku,
      productName: product.name,
      soldPrice: product.defaultNetPrice.toFixed(2),
      quantity: 1,
    }]);
    setSearchTerm('');
    setShowDropdown(false);
  }

  function updateLine(index, field, value) {
    setLines(prev => prev.map((l, i) => i === index ? { ...l, [field]: value } : l));
  }

  function removeLine(index) {
    setLines(prev => prev.filter((_, i) => i !== index));
  }

  async function handleSubmit() {
    const dealId = generateDealId();
    const deal = {
      id: dealId,
      agent: user.displayName,
      country: dealInfo.country,
      retailer: dealInfo.retailer,
      periodStart: dealInfo.periodStart,
      periodEnd: dealInfo.periodEnd,
      status: CONFIG.STATUS.DRAFT,
      createdDate: new Date().toISOString().split('T')[0],
      approvedBy: '',
      approvalDate: '',
      notes: dealInfo.notes,
    };
    const dealLinesData = computedLines.map(l => ({
      dealId,
      sku: l.sku,
      soldPrice: parseFloat(l.soldPrice) || 0,
      quantity: parseInt(l.quantity) || 0,
    }));
    const success = await onSubmit(deal, dealLinesData);
    if (success !== false) onComplete();
  }

  const canProceedStep1 = dealInfo.country && dealInfo.retailer && dealInfo.periodStart && dealInfo.periodEnd;
  const canProceedStep2 = lines.length > 0;

  return (
    <div>
      {/* Steps */}
      <div className="steps">
        <div className={`step ${step === 1 ? 'active' : step > 1 ? 'done' : ''}`}>
          <span className="step-num">1</span>Deal Info
        </div>
        <div className={`step ${step === 2 ? 'active' : step > 2 ? 'done' : ''}`}>
          <span className="step-num">2</span>Products
        </div>
        <div className={`step ${step === 3 ? 'active' : step > 3 ? 'done' : ''}`}>
          <span className="step-num">3</span>Review
        </div>
        <div className={`step ${step === 4 ? 'active' : ''}`}>
          <span className="step-num">4</span>Submit
        </div>
      </div>

      {/* Step 1: Deal Info */}
      {step === 1 && (
        <div className="card">
          <div className="card-title" style={{ marginBottom: 20 }}>Deal Information</div>
          <div className="form-row">
            <div className="form-group">
              <label>Country / Region</label>
              <select className="form-select" value={dealInfo.country}
                onChange={e => setDealInfo({ ...dealInfo, country: e.target.value, retailer: '' })}>
                <option value="">Select country</option>
                {config.countries.map(c => <option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label>Retailer</label>
              <select className="form-select" value={dealInfo.retailer}
                onChange={e => setDealInfo({ ...dealInfo, retailer: e.target.value })}>
                <option value="">Select retailer</option>
                {retailers.map(r => <option key={r}>{r}</option>)}
              </select>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label>Deal Period Start</label>
              <input type="date" className="form-input" value={dealInfo.periodStart}
                onChange={e => setDealInfo({ ...dealInfo, periodStart: e.target.value })} />
            </div>
            <div className="form-group">
              <label>Deal Period End</label>
              <input type="date" className="form-input" value={dealInfo.periodEnd}
                onChange={e => setDealInfo({ ...dealInfo, periodEnd: e.target.value })} />
            </div>
          </div>
          <div className="form-group">
            <label>Notes (optional)</label>
            <textarea className="form-input" value={dealInfo.notes} onChange={e => setDealInfo({ ...dealInfo, notes: e.target.value })}
              placeholder="Deal description, promo context, special terms..." />
          </div>
          <div style={{ marginTop: 24, display: 'flex', justifyContent: 'flex-end' }}>
            <button className="btn btn-primary" disabled={!canProceedStep1} onClick={() => setStep(2)}>
              Next: Add Products
            </button>
          </div>
        </div>
      )}

      {/* Step 2: Add Products */}
      {step === 2 && (
        <div className="card">
          <div className="card-title" style={{ marginBottom: 20 }}>Add Products to Deal</div>

          {/* Product Search */}
          <div style={{ position: 'relative', marginBottom: 20 }}>
            <div className="search-box">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
              </svg>
              <input
                placeholder="Search products by name or SKU..."
                value={searchTerm}
                onChange={e => { setSearchTerm(e.target.value); setShowDropdown(true); }}
                onFocus={() => setShowDropdown(true)}
              />
            </div>
            {showDropdown && searchTerm && (
              <div className="product-dropdown">
                {filteredProducts.slice(0, 15).map(p => (
                  <div key={p.sku} className="product-dropdown-item" onClick={() => addProductLine(p)}>
                    <span>{p.name}</span>
                    <span>
                      <span className="sku">{p.sku}</span>
                      &nbsp;·&nbsp;{fmt.eur(p.listPrice)}
                    </span>
                  </div>
                ))}
                {filteredProducts.length === 0 && (
                  <div style={{ padding: '12px 14px', color: '#94a3b8', fontSize: 13 }}>No products found</div>
                )}
              </div>
            )}
          </div>

          {/* Selected Lines */}
          {lines.length > 0 && (
            <div className="table-wrap">
              <table className="deal-lines-table">
                <thead>
                  <tr>
                    <th>SKU</th><th>Product</th><th>List Price</th><th>Max SOA</th>
                    <th>Sold Price</th><th>Qty</th><th>SOA</th><th>SOA Check</th>
                    <th>Margin %</th><th>Comm Rate</th><th>Line Revenue</th><th></th>
                  </tr>
                </thead>
                <tbody>
                  {computedLines.map((line, i) => {
                    const product = products.find(p => p.sku === line.sku);
                    return (
                      <tr key={line.sku}>
                        <td style={{ fontFamily: 'monospace', fontSize: 11 }}>{line.sku}</td>
                        <td style={{ fontSize: 12 }}>{line.productName || product?.name}</td>
                        <td>{fmt.eur(product?.listPrice)}</td>
                        <td>{fmt.eur(product?.maxSOA)}</td>
                        <td>
                          <input type="number" step="0.01" value={line.soldPrice}
                            onChange={e => updateLine(i, 'soldPrice', e.target.value)} />
                        </td>
                        <td>
                          <input type="number" min="1" value={line.quantity}
                            onChange={e => updateLine(i, 'quantity', e.target.value)} style={{ width: 60 }} />
                        </td>
                        <td>{fmt.eur(line.actualSOA)}</td>
                        <td>
                          {line.soaCheck === 'ABOVE MAX'
                            ? <span className="soa-warn">ABOVE MAX</span>
                            : <span className="soa-ok">OK</span>}
                        </td>
                        <td style={{ color: (line.marginPercent || 0) < 0.25 ? 'var(--danger)' : 'var(--success)' }}>
                          {fmt.pct(line.marginPercent)}
                        </td>
                        <td>{fmt.pct(line.commissionRate)}</td>
                        <td>{fmt.eur(line.lineRevenue)}</td>
                        <td><button className="remove-line" onClick={() => removeLine(i)} title="Remove">&times;</button></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {lines.length === 0 && (
            <div className="empty-state">
              <h3>No products added yet</h3>
              <p>Search and select products from the catalog above.</p>
            </div>
          )}

          {/* Totals Summary */}
          {lines.length > 0 && (
            <div className="summary-box" style={{ marginTop: 20 }}>
              <div className="summary-item">
                <label>Total SOA</label>
                <div className="val" style={{ color: 'var(--accent)' }}>{fmt.eur(totals.totalSOA)}</div>
              </div>
              <div className="summary-item">
                <label>Total Commission</label>
                <div className="val" style={{ color: 'var(--warning)' }}>{fmt.eur(totals.totalCommission)}</div>
              </div>
              <div className="summary-item">
                <label>Total Revenue</label>
                <div className="val" style={{ color: 'var(--success)' }}>{fmt.eur(totals.totalRevenue)}</div>
              </div>
              <div className="summary-item">
                <label>Avg Margin</label>
                <div className="val" style={{ color: totals.avgMargin < 0.25 ? 'var(--danger)' : 'var(--success)' }}>
                  {fmt.pct(totals.avgMargin)}
                </div>
              </div>
            </div>
          )}

          <div style={{ marginTop: 24, display: 'flex', justifyContent: 'space-between' }}>
            <button className="btn btn-outline" onClick={() => setStep(1)}>Back</button>
            <button className="btn btn-primary" disabled={!canProceedStep2} onClick={() => setStep(3)}>
              Next: Review
            </button>
          </div>
        </div>
      )}

      {/* Step 3: Review */}
      {step === 3 && (
        <div className="card">
          <div className="card-title" style={{ marginBottom: 20 }}>Review Deal</div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 24 }}>
            <div><strong>Country:</strong> {dealInfo.country}</div>
            <div><strong>Retailer:</strong> {dealInfo.retailer}</div>
            <div><strong>Period:</strong> {fmt.date(dealInfo.periodStart)} — {fmt.date(dealInfo.periodEnd)}</div>
            <div><strong>Agent:</strong> {user.displayName}</div>
            {dealInfo.notes && <div style={{ gridColumn: '1/3' }}><strong>Notes:</strong> {dealInfo.notes}</div>}
          </div>

          <div className="summary-box" style={{ marginBottom: 24 }}>
            <div className="summary-item">
              <label>Total SOA</label>
              <div className="val" style={{ color: 'var(--accent)' }}>{fmt.eur(totals.totalSOA)}</div>
            </div>
            <div className="summary-item">
              <label>Total Commission</label>
              <div className="val" style={{ color: 'var(--warning)' }}>{fmt.eur(totals.totalCommission)}</div>
            </div>
            <div className="summary-item">
              <label>Total Revenue</label>
              <div className="val" style={{ color: 'var(--success)' }}>{fmt.eur(totals.totalRevenue)}</div>
            </div>
            <div className="summary-item">
              <label>Avg Margin</label>
              <div className="val">{fmt.pct(totals.avgMargin)}</div>
            </div>
          </div>

          {/* Lines summary */}
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Product</th><th>Sold Price</th><th>Qty</th><th>SOA</th><th>SOA Check</th>
                  <th>Margin %</th><th>Commission</th><th>Revenue</th>
                </tr>
              </thead>
              <tbody>
                {computedLines.map((line, i) => (
                  <tr key={i}>
                    <td>{line.productName}</td>
                    <td>{fmt.eur(line.soldPrice)}</td>
                    <td>{fmt.num(line.quantity)}</td>
                    <td>{fmt.eur(line.actualSOA)}</td>
                    <td>{line.soaCheck === 'ABOVE MAX' ? <span className="soa-warn">ABOVE MAX</span> : <span className="soa-ok">OK</span>}</td>
                    <td style={{ color: (line.marginPercent || 0) < 0.25 ? 'var(--danger)' : 'var(--success)' }}>{fmt.pct(line.marginPercent)}</td>
                    <td>{fmt.eur(line.commissionAmount)}</td>
                    <td>{fmt.eur(line.lineRevenue)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* SOA warnings */}
          {computedLines.some(l => l.soaCheck === 'ABOVE MAX') && (
            <div style={{ marginTop: 16, background: 'var(--danger-light)', padding: '12px 16px', borderRadius: 8, fontSize: 13, color: 'var(--danger)' }}>
              <strong>Warning:</strong> One or more product lines exceed the maximum SOA. HQ review required.
            </div>
          )}

          <div style={{ marginTop: 24, display: 'flex', justifyContent: 'space-between' }}>
            <button className="btn btn-outline" onClick={() => setStep(2)}>Back: Edit Products</button>
            <button className="btn btn-success" onClick={() => { setStep(4); handleSubmit(); }}>
              Submit Deal as Draft
            </button>
          </div>
        </div>
      )}

      {/* Step 4: Submitted */}
      {step === 4 && (
        <div className="card" style={{ textAlign: 'center', padding: 48 }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>&#10003;</div>
          <h2 style={{ marginBottom: 8 }}>Deal Submitted</h2>
          <p style={{ color: 'var(--text-secondary)', marginBottom: 24 }}>
            Your deal has been saved as a Draft and is pending HQ approval.
          </p>
          <div className="btn-group" style={{ justifyContent: 'center' }}>
            <button className="btn btn-primary" onClick={onComplete}>View My Deals</button>
            <button className="btn btn-outline" onClick={() => { setStep(1); setLines([]); setDealInfo({ country: config.countries[0] || '', retailer: '', periodStart: '', periodEnd: '', notes: '' }); }}>
              Create Another Deal
            </button>
          </div>
        </div>
      )}
    </div>
  );
}


/* ═══════════════════════════════════════════════
   My Deals Page
   ═══════════════════════════════════════════════ */
function MyDealsPage({ deals, dealLines, user, products, isHQ }) {
  const [expandedDeal, setExpandedDeal] = useState(null);
  const myDeals = deals.filter(d => d.agent === user.displayName);

  return (
    <div>
      <div className="card">
        <div className="card-header">
          <div>
            <div className="card-title">My Deals</div>
            <div className="card-subtitle">{myDeals.length} deals</div>
          </div>
        </div>
        {myDeals.length === 0 ? (
          <div className="empty-state">
            <h3>No deals yet</h3>
            <p>Create your first deal to start tracking.</p>
          </div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Deal ID</th><th>Retailer</th><th>Period</th>
                  <th>Status</th><th>SOA</th><th>Commission</th><th>Revenue</th><th>Margin</th><th>Claim Deadline</th><th></th>
                </tr>
              </thead>
              <tbody>
                {myDeals.map(d => {
                  const overdue = isDealOverdue(d);
                  const days = daysUntilDeadline(d);
                  const showDeadline = ['Approved', 'Live', 'Completed'].includes(d.status) && (d.claimDeadline || d.periodEnd);
                  return (
                  <React.Fragment key={d.id}>
                    <tr onClick={() => setExpandedDeal(expandedDeal === d.id ? null : d.id)} style={{ cursor: 'pointer' }}>
                      <td style={{ fontFamily: 'monospace', fontSize: 12 }}>{d.id}</td>
                      <td>{d.retailer}</td>
                      <td style={{ fontSize: 12 }}>{fmt.date(d.periodStart)} — {fmt.date(d.periodEnd)}</td>
                      <td><StatusBadge status={d.status} overdue={overdue} /></td>
                      <td>{fmt.eur(d.totalSOA)}</td>
                      <td>{fmt.eur(d.totalCommission)}</td>
                      <td>{fmt.eur(d.totalRevenue)}</td>
                      <td>{fmt.pct(d.avgMargin)}</td>
                      <td style={{ fontSize: 12 }}>
                        {showDeadline ? (
                          <span style={{ color: days !== null && days < 7 ? 'var(--danger)' : days !== null && days < 30 ? 'var(--warning)' : 'inherit' }}>
                            {fmt.date(getClaimDeadline(d))}
                            {days !== null && <span style={{ fontSize: 11, marginLeft: 4 }}>({days < 0 ? 'overdue' : days + 'd'})</span>}
                          </span>
                        ) : '—'}
                      </td>
                      <td style={{ fontSize: 16 }}>{expandedDeal === d.id ? '▲' : '▼'}</td>
                    </tr>
                    {expandedDeal === d.id && (
                      <tr>
                        <td colSpan={10} style={{ padding: 0, background: '#f8fafc' }}>
                          <DealDetail deal={d} lines={dealLines[d.id] || []} products={products} isHQ={isHQ} />
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════
   All Deals Page (HQ)
   ═══════════════════════════════════════════════ */
function AllDealsPage({ deals, dealLines, user, products, onStatusChange, onSettle }) {
  const [expandedDeal, setExpandedDeal] = useState(null);
  const [filterStatus, setFilterStatus] = useState('');
  const [filterAgent, setFilterAgent] = useState('');
  const [filterRetailer, setFilterRetailer] = useState('');
  const [showRejectModal, setShowRejectModal] = useState(null);
  const [rejectReason, setRejectReason] = useState('');
  const [showSettleModal, setShowSettleModal] = useState(null);
  const [settleNotes, setSettleNotes] = useState('');

  const agents = [...new Set(deals.map(d => d.agent))];
  const retailers = [...new Set(deals.map(d => d.retailer))];

  const filtered = deals.filter(d => {
    if (filterStatus && d.status !== filterStatus) return false;
    if (filterAgent && d.agent !== filterAgent) return false;
    if (filterRetailer && d.retailer !== filterRetailer) return false;
    return true;
  });

  function handleApprove(dealId) {
    onStatusChange(dealId, CONFIG.STATUS.APPROVED);
  }

  async function handleReject() {
    if (showRejectModal) {
      await onStatusChange(showRejectModal, CONFIG.STATUS.REJECTED, rejectReason);
      setShowRejectModal(null);
      setRejectReason('');
    }
  }

  function handleStatusChange(dealId, newStatus) {
    onStatusChange(dealId, newStatus);
  }

  async function handleSettle() {
    if (showSettleModal) {
      await onSettle(showSettleModal, settleNotes);
      setShowSettleModal(null);
      setSettleNotes('');
    }
  }

  function exportAll() {
    const rows = filtered.map(d => ({
      'Deal ID': d.id, Agent: d.agent, Country: d.country, Retailer: d.retailer,
      'Period Start': d.periodStart, 'Period End': d.periodEnd, Status: d.status,
      'SOA (€)': (d.totalSOA || 0).toFixed(2), 'Commission (€)': (d.totalCommission || 0).toFixed(2),
      'Revenue (€)': (d.totalRevenue || 0).toFixed(2), 'Margin %': ((d.avgMargin || 0) * 100).toFixed(1) + '%',
      Created: d.createdDate, 'Approved By': d.approvedBy || '', Notes: d.notes || '',
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'All Deals');
    XLSX.writeFile(wb, `all-deals-${new Date().toISOString().split('T')[0]}.xlsx`);
  }

  return (
    <div>
      {/* Filters */}
      <div className="filter-bar">
        <div className="form-group">
          <label>Status</label>
          <select className="form-select" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
            <option value="">All</option>
            {Object.values(CONFIG.STATUS).map(s => <option key={s}>{s}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label>Agent</label>
          <select className="form-select" value={filterAgent} onChange={e => setFilterAgent(e.target.value)}>
            <option value="">All</option>
            {agents.map(a => <option key={a}>{a}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label>Retailer</label>
          <select className="form-select" value={filterRetailer} onChange={e => setFilterRetailer(e.target.value)}>
            <option value="">All</option>
            {retailers.map(r => <option key={r}>{r}</option>)}
          </select>
        </div>
        <div className="form-group" style={{ marginLeft: 'auto' }}>
          <label>&nbsp;</label>
          <button className="btn btn-outline" onClick={exportAll}>Export to Excel</button>
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <div>
            <div className="card-title">All Deals</div>
            <div className="card-subtitle">{filtered.length} deals</div>
          </div>
        </div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Deal ID</th><th>Agent</th><th>Country</th><th>Retailer</th><th>Period</th>
                <th>Status</th><th>SOA</th><th>Actual SOA</th><th>Commission</th><th>Revenue</th><th>Margin</th><th>Claim Deadline</th><th>Actions</th><th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(d => {
                const overdue = isDealOverdue(d);
                const days = daysUntilDeadline(d);
                const hasActuals = d.status === 'Claim Received' || d.status === 'Settled';
                return (
                <React.Fragment key={d.id}>
                  <tr>
                    <td style={{ fontFamily: 'monospace', fontSize: 12 }}>{d.id}</td>
                    <td>{d.agent}</td>
                    <td>{d.country}</td>
                    <td>{d.retailer}</td>
                    <td style={{ fontSize: 12 }}>{fmt.date(d.periodStart)} — {fmt.date(d.periodEnd)}</td>
                    <td><StatusBadge status={d.status} overdue={overdue} /></td>
                    <td>{fmt.eur(d.totalSOA)}</td>
                    <td>{hasActuals ? fmt.eur(d.actualSOA) : '—'}</td>
                    <td>{fmt.eur(d.totalCommission)}</td>
                    <td>{fmt.eur(d.totalRevenue)}</td>
                    <td style={{ color: (d.avgMargin || 0) < 0.25 ? 'var(--danger)' : 'inherit' }}>{fmt.pct(d.avgMargin)}</td>
                    <td style={{ fontSize: 12 }}>
                      {d.claimDeadline || d.periodEnd ? (
                        <span style={{ color: days !== null && days < 7 ? 'var(--danger)' : days !== null && days < 30 ? 'var(--warning)' : 'inherit' }}>
                          {fmt.date(getClaimDeadline(d))}
                        </span>
                      ) : '—'}
                    </td>
                    <td>
                      <div className="btn-group">
                        {d.status === CONFIG.STATUS.DRAFT && (
                          <>
                            <button className="btn btn-success btn-sm" onClick={() => handleApprove(d.id)}>Approve</button>
                            <button className="btn btn-danger btn-sm" onClick={() => setShowRejectModal(d.id)}>Reject</button>
                          </>
                        )}
                        {d.status === CONFIG.STATUS.APPROVED && (
                          <button className="btn btn-sm btn-outline" onClick={() => handleStatusChange(d.id, CONFIG.STATUS.LIVE)}>Mark Live</button>
                        )}
                        {d.status === CONFIG.STATUS.LIVE && (
                          <button className="btn btn-sm btn-outline" onClick={() => handleStatusChange(d.id, CONFIG.STATUS.COMPLETED)}>Complete</button>
                        )}
                        {d.status === CONFIG.STATUS.CLAIM_RECEIVED && (
                          <button className="btn btn-sm btn-success" onClick={() => setShowSettleModal(d.id)}>Settle</button>
                        )}
                      </div>
                    </td>
                    <td>
                      <button className="btn btn-sm btn-outline" onClick={() => setExpandedDeal(expandedDeal === d.id ? null : d.id)}>
                        {expandedDeal === d.id ? '▲' : '▼'}
                      </button>
                    </td>
                  </tr>
                  {expandedDeal === d.id && (
                    <tr>
                      <td colSpan={14} style={{ padding: 0, background: '#f8fafc' }}>
                        <DealDetail deal={d} lines={dealLines[d.id] || []} products={products} isHQ={true} />
                      </td>
                    </tr>
                  )}
                </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Reject Modal */}
      {showRejectModal && (
        <div className="modal-overlay" onClick={() => setShowRejectModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Reject Deal</h3>
            <p style={{ color: 'var(--text-secondary)', marginBottom: 16, fontSize: 14 }}>
              Please provide a reason for rejecting deal {showRejectModal}.
            </p>
            <div className="form-group">
              <label>Reason</label>
              <textarea className="form-input" value={rejectReason} onChange={e => setRejectReason(e.target.value)}
                placeholder="e.g., Margins too low, SOA exceeds budget..." autoFocus />
            </div>
            <div className="btn-group" style={{ justifyContent: 'flex-end' }}>
              <button className="btn btn-outline" onClick={() => setShowRejectModal(null)}>Cancel</button>
              <button className="btn btn-danger" onClick={handleReject} disabled={!rejectReason.trim()}>Reject Deal</button>
            </div>
          </div>
        </div>
      )}

      {/* Settlement Modal */}
      {showSettleModal && (
        <div className="modal-overlay" onClick={() => setShowSettleModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Settle Deal</h3>
            <p style={{ color: 'var(--text-secondary)', marginBottom: 16, fontSize: 14 }}>
              Mark deal {showSettleModal} as settled. Add settlement notes (payment reference, adjustments, etc.).
            </p>
            <div className="form-group">
              <label>Settlement Notes (optional)</label>
              <textarea className="form-input" value={settleNotes} onChange={e => setSettleNotes(e.target.value)}
                placeholder="e.g., Credit note #CN-2026-0042 issued, payment processed..." autoFocus />
            </div>
            <div className="btn-group" style={{ justifyContent: 'flex-end' }}>
              <button className="btn btn-outline" onClick={() => setShowSettleModal(null)}>Cancel</button>
              <button className="btn btn-success" onClick={handleSettle}>Confirm Settlement</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


/* ═══════════════════════════════════════════════
   Deal Detail (expanded row)
   ═══════════════════════════════════════════════ */
function DealDetail({ deal, lines, products, isHQ }) {
  const [copiedLink, setCopiedLink] = useState(false);

  const computedLines = lines.map(line => {
    const product = products.find(p => p.sku === line.sku);
    return Calculator.computeLine(line, product);
  });

  const hasClaimData = deal.status === 'Claim Received' || deal.status === 'Settled';
  const showPdfButton = ['Approved', 'Live', 'Completed', 'Claim Received', 'Settled'].includes(deal.status);
  const claimUrl = getClaimUrl(deal.id);

  function handleCopyLink() {
    navigator.clipboard.writeText(claimUrl).then(() => {
      setCopiedLink(true);
      setTimeout(() => setCopiedLink(false), 2000);
    });
  }

  function handleDownloadPdf() {
    generateSalesPolicy(deal, lines, products);
  }

  return (
    <div style={{ padding: '16px 24px' }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginBottom: 16, fontSize: 13 }}>
        <div><strong>Created:</strong> {fmt.date(deal.createdDate)}</div>
        <div><strong>Approved By:</strong> {deal.approvedBy || '—'}</div>
        <div><strong>Approval Date:</strong> {deal.approvalDate ? fmt.date(deal.approvalDate) : '—'}</div>
        {deal.claimDeadline && <div><strong>Claim Deadline:</strong> {fmt.date(deal.claimDeadline)}</div>}
        {deal.claimReceivedDate && <div><strong>Claim Received:</strong> {fmt.date(deal.claimReceivedDate)}</div>}
        {deal.settlementDate && <div><strong>Settled:</strong> {fmt.date(deal.settlementDate)}</div>}
        {deal.notes && <div style={{ gridColumn: '1/4' }}><strong>Notes:</strong> {deal.notes}</div>}
        {deal.settlementNotes && <div style={{ gridColumn: '1/4' }}><strong>Settlement Notes:</strong> {deal.settlementNotes}</div>}
      </div>

      {/* Action buttons: PDF + Claim Link */}
      {showPdfButton && (
        <div style={{ display: 'flex', gap: 12, marginBottom: 16, flexWrap: 'wrap', alignItems: 'center' }}>
          <button className="btn btn-primary btn-sm" onClick={handleDownloadPdf}>
            Download Sales Policy PDF
          </button>
          <div className="claim-link-box" style={{ flex: 1, minWidth: 200 }}>
            <span style={{ flex: 1 }}>{claimUrl}</span>
            <button className="btn btn-outline btn-sm" onClick={handleCopyLink}>
              {copiedLink ? 'Copied!' : 'Copy Link'}
            </button>
          </div>
        </div>
      )}

      {/* Planned vs Actual comparison (when claim data exists) */}
      {hasClaimData && (
        <div style={{ marginBottom: 16 }}>
          <h4 style={{ fontSize: 13, fontWeight: 700, marginBottom: 8, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: 0.3 }}>Planned vs Actual</h4>
          <div className="summary-box" style={{ marginBottom: 12 }}>
            <div className="summary-item">
              <label>Planned SOA</label>
              <div className="val" style={{ fontSize: 16, color: 'var(--accent)' }}>{fmt.eur(deal.totalSOA)}</div>
            </div>
            <div className="summary-item">
              <label>Actual SOA</label>
              <div className="val" style={{ fontSize: 16, color: 'var(--accent)' }}>{fmt.eur(deal.actualSOA)}</div>
            </div>
            <div className="summary-item">
              <label>SOA Variance</label>
              <div className={'val ' + (deal.actualSOA >= deal.totalSOA ? 'variance-pos' : 'variance-neg')} style={{ fontSize: 16 }}>
                {deal.totalSOA > 0 ? ((deal.actualSOA / deal.totalSOA * 100) - 100).toFixed(1) + '%' : '—'}
              </div>
            </div>
            <div className="summary-item">
              <label>Planned Commission</label>
              <div className="val" style={{ fontSize: 16, color: 'var(--warning)' }}>{fmt.eur(deal.totalCommission)}</div>
            </div>
            <div className="summary-item">
              <label>Actual Commission</label>
              <div className="val" style={{ fontSize: 16, color: 'var(--warning)' }}>{fmt.eur(deal.actualCommission)}</div>
            </div>
            <div className="summary-item">
              <label>Planned Revenue</label>
              <div className="val" style={{ fontSize: 16, color: 'var(--success)' }}>{fmt.eur(deal.totalRevenue)}</div>
            </div>
            <div className="summary-item">
              <label>Actual Revenue</label>
              <div className="val" style={{ fontSize: 16, color: 'var(--success)' }}>{fmt.eur(deal.actualRevenue)}</div>
            </div>
          </div>
          <table style={{ fontSize: 12 }}>
            <thead>
              <tr>
                <th>Product</th><th>SKU</th><th>Planned Qty</th><th>Actual Qty</th>
                <th>Planned SOA</th><th>Actual SOA</th><th>Variance</th>
              </tr>
            </thead>
            <tbody>
              {computedLines.map((line, i) => {
                const actualQty = line.actualQuantity || 0;
                const plannedQty = parseInt(line.quantity) || 0;
                const product = products.find(p => p.sku === line.sku);
                const soaPerUnit = (line.actualSOA || 0);
                const plannedLineSoa = soaPerUnit * plannedQty;
                const actualLineSoa = line.actualSOA && typeof lines[i]?.actualSOA !== 'undefined' ? lines[i].actualSOA : soaPerUnit * actualQty;
                const qtyVariance = plannedQty > 0 ? ((actualQty / plannedQty * 100) - 100).toFixed(1) : '—';
                return (
                  <tr key={i}>
                    <td>{line.productName || product?.name}</td>
                    <td style={{ fontFamily: 'monospace', fontSize: 11 }}>{line.sku}</td>
                    <td>{fmt.num(plannedQty)}</td>
                    <td>{fmt.num(actualQty)}</td>
                    <td>{fmt.eur(soaPerUnit * plannedQty)}</td>
                    <td>{fmt.eur(lines[i]?.actualSOA || 0)}</td>
                    <td className={actualQty >= plannedQty ? 'variance-pos' : actualQty > 0 ? 'variance-neg' : 'variance-zero'}>
                      {qtyVariance !== '—' ? qtyVariance + '%' : '—'}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* Standard line detail table */}
      {!hasClaimData && (
        <table style={{ fontSize: 12 }}>
          <thead>
            <tr>
              <th>SKU</th><th>Product</th>
              {isHQ && <th>Landed Cost</th>}
              <th>List Price</th><th>Sold Price</th><th>Qty</th>
              <th>SOA</th><th>SOA Check</th>
              {isHQ && <th>Margin/Unit</th>}
              <th>Margin %</th><th>Comm Rate</th><th>Commission</th><th>Revenue</th>
            </tr>
          </thead>
          <tbody>
            {computedLines.map((line, i) => {
              const product = products.find(p => p.sku === line.sku);
              return (
                <tr key={i}>
                  <td style={{ fontFamily: 'monospace', fontSize: 11 }}>{line.sku}</td>
                  <td>{line.productName || product?.name}</td>
                  {isHQ && <td>{fmt.eur(product?.landedCost)}</td>}
                  <td>{fmt.eur(product?.listPrice)}</td>
                  <td>{fmt.eur(line.soldPrice)}</td>
                  <td>{fmt.num(line.quantity)}</td>
                  <td>{fmt.eur(line.actualSOA)}</td>
                  <td>{line.soaCheck === 'ABOVE MAX' ? <span className="soa-warn">ABOVE MAX</span> : <span className="soa-ok">OK</span>}</td>
                  {isHQ && <td>{fmt.eur(line.marginPerUnit)}</td>}
                  <td style={{ color: (line.marginPercent || 0) < 0.25 ? 'var(--danger)' : 'var(--success)' }}>{fmt.pct(line.marginPercent)}</td>
                  <td>{fmt.pct(line.commissionRate)}</td>
                  <td>{fmt.eur(line.commissionAmount)}</td>
                  <td>{fmt.eur(line.lineRevenue)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      )}
    </div>
  );
}


/* ═══════════════════════════════════════════════

function ProductsPage({ products, isHQ }) {
  const [search, setSearch] = useState('');

  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(search.toLowerCase()) ||
    p.sku.toLowerCase().includes(search.toLowerCase())
  );

  function exportProducts() {
    const rows = filtered.map(p => {
      const row = { SKU: p.sku, 'Product Name': p.name, 'List Price (€)': p.listPrice.toFixed(2), 'Max SOA (€)': p.maxSOA.toFixed(2), 'Default Net Price (€)': p.defaultNetPrice.toFixed(2) };
      if (isHQ) row['Landed Cost (€)'] = p.landedCost.toFixed(2);
      return row;
    });
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Products');
    XLSX.writeFile(wb, 'hombli-products.xlsx');
  }

  return (
    <div>
      <div className="card">
        <div className="card-header">
          <div>
            <div className="card-title">Product Catalog</div>
            <div className="card-subtitle">{products.length} products · {isHQ ? 'Full view' : 'Agent view (Landed Cost hidden)'}</div>
          </div>
          <button className="btn btn-outline btn-sm" onClick={exportProducts}>Export</button>
        </div>
        <div className="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input placeholder="Search by name or SKU..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>SKU</th><th>Product Name</th>
                {isHQ && <th>Landed Cost</th>}
                <th>List Price</th><th>Max SOA</th><th>Default Net Price</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(p => (
                <tr key={p.sku}>
                  <td style={{ fontFamily: 'monospace', fontSize: 12 }}>{p.sku}</td>
                  <td>{p.name}</td>
                  {isHQ && <td>{fmt.eur(p.landedCost)}</td>}
