function StatusBadge({ status, overdue }) {
  if (overdue) return <span className="badge badge-overdue">Overdue</span>;
  const cls = {
    Draft: 'badge-draft',
    Approved: 'badge-approved',
    Live: 'badge-live',
    Completed: 'badge-completed',
    Rejected: 'badge-rejected',
    'Claim Received': 'badge-claim-received',
    Settled: 'badge-settled',
  }[status] || 'badge-draft';

  return <span className={`badge ${cls}`}>{status}</span>;
}


/* ═══════════════════════════════════════════════
   Claim Helpers
   ═══════════════════════════════════════════════ */
function getClaimDeadline(deal) {
  if (deal.claimDeadline) return new Date(deal.claimDeadline);
  if (deal.periodEnd) {
    const d = new Date(deal.periodEnd);
    d.setDate(d.getDate() + CONFIG.CLAIM_DEADLINE_WEEKS * 7);
    return d;
  }
  return null;
}

function isDealOverdue(deal) {
  if (deal.status !== 'Completed') return false;
  const deadline = getClaimDeadline(deal);
  if (!deadline) return false;
  return new Date() > deadline;
}

function daysUntilDeadline(deal) {
  const deadline = getClaimDeadline(deal);
  if (!deadline) return null;
  const now = new Date();
  return Math.ceil((deadline - now) / (1000 * 60 * 60 * 24));
}

function getClaimUrl(dealId) {
  return CONFIG.CLAIM_BASE_URL + '?claim=' + dealId;
}


/* ═══════════════════════════════════════════════
   Sales Policy PDF Generator
   ═══════════════════════════════════════════════ */
function generateSalesPolicy(deal, lines, products) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  // Header
  doc.setFontSize(10);
  doc.setTextColor(100);
  doc.text('AVANCA INTERNATIONAL B.V.', 14, 15);
  doc.setFontSize(18);
  doc.setTextColor(37, 99, 235);
  doc.text('Sales Policy Notification', 14, 25);

  // Deal reference box
  doc.setFontSize(9);
  doc.setTextColor(100);
  doc.text('Deal Reference: ' + deal.id, 14, 34);
  doc.text('Date: ' + new Date().toLocaleDateString('en-GB'), 14, 39);

  // Divider
  doc.setDrawColor(226, 232, 240);
  doc.line(14, 43, 196, 43);

  // Deal info
  doc.setFontSize(11);
  doc.setTextColor(15, 23, 42);
  const infoY = 50;
  doc.setFont(undefined, 'bold');
  doc.text('Retailer:', 14, infoY);
  doc.text('Country:', 14, infoY + 7);
  doc.text('Agent:', 14, infoY + 14);
  doc.text('Deal Period:', 14, infoY + 21);
  doc.setFont(undefined, 'normal');
  doc.text(deal.retailer || '', 55, infoY);
  doc.text(deal.country || '', 55, infoY + 7);
  doc.text(deal.agent || '', 55, infoY + 14);
  doc.text((fmt.date(deal.periodStart) || '') + '  —  ' + (fmt.date(deal.periodEnd) || ''), 55, infoY + 21);

  // Product table
  const tableData = lines.map(line => {
    const product = products.find(p => p.sku === line.sku) || {};
    const soaPerUnit = Math.max(0, (product.listPrice || 0) - (parseFloat(line.soldPrice) || 0));
    return [
      line.productName || product.name || '',
      line.sku,
      String(parseInt(line.quantity) || 0),
      fmt.eur(product.listPrice || 0),
      fmt.eur(parseFloat(line.soldPrice) || 0),
      fmt.eur(soaPerUnit),
    ];
  });

  doc.autoTable({
    startY: infoY + 30,
    head: [['Product', 'EAN/SKU', 'Max Volume', 'NRRP', 'DIP', 'SOA/Unit']],
    body: tableData,
    theme: 'grid',
    headStyles: { fillColor: [37, 99, 235], fontSize: 9, fontStyle: 'bold' },
    bodyStyles: { fontSize: 9 },
    columnStyles: {
      0: { cellWidth: 55 },
      2: { halign: 'right' },
      3: { halign: 'right' },
      4: { halign: 'right' },
      5: { halign: 'right' },
    },
    margin: { left: 14, right: 14 },
  });

  let y = doc.lastAutoTable.finalY + 12;

  // General conditions
  doc.setFontSize(12);
  doc.setFont(undefined, 'bold');
  doc.setTextColor(15, 23, 42);
  doc.text('General Conditions', 14, y);
  y += 8;

  doc.setFontSize(9);
  doc.setFont(undefined, 'normal');
  doc.setTextColor(71, 85, 105);

  const conditions = [
    'A. SOA (Sales on Account) applies only to the products and quantities specified in this notification.',
    'B. SOA is valid exclusively during the deal period stated above. Quantities sold outside this period are not eligible.',
    'C. Weekly stock and sales reports must be provided to the assigned agent during the deal period.',
    'D. All claims must be submitted within 12 weeks of the campaign end date.',
    'E. Claims must be submitted to the assigned agent and finance@avanca.nl with supporting sell-through data.',
  ];

  conditions.forEach(c => {
    const split = doc.splitTextToSize(c, 178);
    if (y + split.length * 5 > 275) {
      doc.addPage();
      y = 20;
    }
    doc.text(split, 14, y);
    y += split.length * 5 + 3;
  });

  // Claim link
  y += 5;
  if (y > 260) { doc.addPage(); y = 20; }
  doc.setFontSize(10);
  doc.setFont(undefined, 'bold');
  doc.setTextColor(37, 99, 235);
  doc.text('Submit Your Claim Online:', 14, y);
  y += 6;
  doc.setFont(undefined, 'normal');
  doc.setFontSize(9);
  const claimUrl = getClaimUrl(deal.id);
  doc.setTextColor(37, 99, 235);
  doc.textWithLink(claimUrl, 14, y, { url: claimUrl });

  if (deal.claimDeadline || deal.periodEnd) {
    y += 6;
    doc.setTextColor(220, 38, 38);
    doc.setFont(undefined, 'bold');
    doc.text('Claim Deadline: ' + fmt.date(getClaimDeadline(deal)), 14, y);
  }

  // Footer
  const pageCount = doc.getNumberOfPages();
  for (let p = 1; p <= pageCount; p++) {
    doc.setPage(p);
    doc.setFontSize(8);
    doc.setTextColor(148, 163, 184);
    doc.text('Powered by Hombli Deal Framework  |  Avanca International B.V.', 14, 290);
    doc.text('Page ' + p + ' of ' + pageCount, 180, 290);
  }

  doc.save('Sales-Policy-' + deal.id + '.pdf');
}


/* ═══════════════════════════════════════════════
   Public Claim Form (no auth required)
   ═══════════════════════════════════════════════ */
function ClaimForm({ dealId }) {
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [deal, setDeal] = useState(null);
  const [lines, setLines] = useState([]);
  const [actualQtys, setActualQtys] = useState({});
  const [contactName, setContactName] = useState('');
  const [contactEmail, setContactEmail] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);

  useEffect(() => {
    loadClaimData();
  }, [dealId]);

  async function loadClaimData() {
    try {
      const url = CONFIG.APPS_SCRIPT_URL + '?action=getClaimData&dealId=' + encodeURIComponent(dealId);
      const res = await fetch(url);
      const data = await res.json();
      if (data.success) {
        setDeal(data.deal);
        setLines(data.lines);
        const qtys = {};
        data.lines.forEach(l => { qtys[l.sku] = ''; });
        setActualQtys(qtys);
      } else {
        setError(data.error || 'Failed to load deal data');
      }
    } catch (e) {
      setError('Failed to connect. Please try again later.');
    }
    setLoading(false);
  }

  function updateQty(sku, val) {
    setActualQtys(prev => ({ ...prev, [sku]: val }));
  }

  async function handleSubmit(e) {
    e.preventDefault();
    setSubmitting(true);

    const claimLines = lines.map(l => ({
      sku: l.sku,
      actualQuantity: Math.min(parseInt(actualQtys[l.sku]) || 0, l.quantity),
    }));

    try {
      const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action: 'submitClaim',
          dealId,
          claimLines,
          contactName,
          contactEmail,
        }),
      });
      const data = await res.json();
      if (data.success) {
        setSubmitted(true);
      } else {
        setError(data.error || 'Submission failed');
      }
    } catch (e) {
      setError('Failed to submit. Please try again.');
    }
    setSubmitting(false);
  }

  if (loading) {
    return (
      <div className="claim-page">
        <div className="claim-container" style={{ textAlign: 'center' }}>
          <div className="spinner"></div>
          <p>Loading claim form...</p>
        </div>
      </div>
    );
  }

  if (error && !deal) {
    return (
      <div className="claim-page">
        <div className="claim-container" style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>&#9888;</div>
          <h2>Unable to Load Claim</h2>
          <p style={{ color: 'var(--text-secondary)' }}>{error}</p>
        </div>
      </div>
    );
  }

  if (submitted) {
    return (
      <div className="claim-page">
        <div className="claim-container claim-success">
          <div style={{ fontSize: 48, marginBottom: 16, color: 'var(--success)' }}>&#10003;</div>
          <h2>Claim Submitted Successfully</h2>
          <p style={{ color: 'var(--text-secondary)', marginBottom: 8 }}>
            Your claim for deal <strong>{dealId}</strong> has been received.
          </p>
          <p style={{ color: 'var(--text-secondary)', fontSize: 13 }}>
            Avanca will review your claim and process the settlement. You will be contacted at <strong>{contactEmail}</strong> if any clarification is needed.
          </p>
        </div>
      </div>
    );
  }

  const deadline = deal.claimDeadline ? new Date(deal.claimDeadline) : null;
  const now = new Date();
  const isExpired = deadline && now > deadline;
  const daysLeft = deadline ? Math.ceil((deadline - now) / (1000 * 60 * 60 * 24)) : null;

  const canSubmit = !isExpired && (deal.status === 'Completed' || deal.status === 'Live') &&
    contactName.trim() && contactEmail.trim() &&
    Object.values(actualQtys).some(v => parseInt(v) > 0);

  return (
    <div className="claim-page">
      <div className="claim-container">
        <div style={{ fontSize: 13, color: 'var(--accent)', fontWeight: 600, letterSpacing: 1, marginBottom: 16 }}>HOMBLI / AVANCA INTERNATIONAL</div>
        <h1>SOA Claim Submission</h1>
        <p className="subtitle">Submit your actual quantities sold for deal <strong>{dealId}</strong></p>

        {error && <div style={{ background: 'var(--danger-light)', color: 'var(--danger)', padding: '10px 16px', borderRadius: 8, marginBottom: 16, fontSize: 13 }}>{error}</div>}

        {/* Deadline banner */}
        {deadline && (
          <div className={`claim-deadline-banner ${isExpired ? 'expired' : daysLeft <= 14 ? 'warn' : 'ok'}`}>
            {isExpired
              ? 'Claim deadline has passed (' + fmt.date(deal.claimDeadline) + '). This claim can no longer be submitted.'
              : 'Claim must be submitted by ' + fmt.date(deal.claimDeadline) + ' (' + daysLeft + ' days remaining)'}
          </div>
        )}

        {/* Deal status check */}
        {deal.status !== 'Completed' && deal.status !== 'Live' && (
          <div className="claim-deadline-banner expired">
            This deal is not eligible for claims (current status: {deal.status}).
          </div>
        )}

        {/* Deal info */}
        <div className="claim-info-grid">
          <div><div className="label">Retailer</div>{deal.retailer}</div>
          <div><div className="label">Country</div>{deal.country}</div>
          <div><div className="label">Agent</div>{deal.agent}</div>
          <div><div className="label">Deal Period</div>{fmt.date(deal.periodStart)} — {fmt.date(deal.periodEnd)}</div>
        </div>

        {/* Product lines */}
        <form onSubmit={handleSubmit}>
          <h3 style={{ fontSize: 14, marginBottom: 12 }}>Products — Enter Actual Quantities Sold</h3>
          <div className="table-wrap" style={{ marginBottom: 24 }}>
            <table>
              <thead>
                <tr>
                  <th>Product</th><th>SKU</th><th>Sold Price</th><th>Planned Qty</th><th>Actual Qty Sold</th>
                </tr>
              </thead>
              <tbody>
                {lines.map(l => (
                  <tr key={l.sku}>
                    <td>{l.productName}</td>
                    <td style={{ fontFamily: 'monospace', fontSize: 11 }}>{l.sku}</td>
                    <td>{fmt.eur(l.soldPrice)}</td>
                    <td>{fmt.num(l.quantity)}</td>
                    <td>
                      <input
                        type="number"
                        className="claim-qty-input"
                        min="0"
                        max={l.quantity}
                        value={actualQtys[l.sku] || ''}
                        onChange={e => updateQty(l.sku, e.target.value)}
                        placeholder="0"
                        disabled={isExpired}
                      />
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Contact info */}
          <h3 style={{ fontSize: 14, marginBottom: 12 }}>Contact Information</h3>
          <div className="form-row" style={{ marginBottom: 24 }}>
            <div className="form-group">
              <label>Your Name</label>
              <input className="form-input" value={contactName} onChange={e => setContactName(e.target.value)}
                placeholder="e.g. Jan de Vries" disabled={isExpired} />
            </div>
            <div className="form-group">
              <label>Email Address</label>
              <input className="form-input" type="email" value={contactEmail} onChange={e => setContactEmail(e.target.value)}
                placeholder="e.g. jan@retailer.com" disabled={isExpired} />
            </div>
          </div>

          <button type="submit" className="btn btn-success" style={{ width: '100%', padding: '14px', fontSize: 15 }}
            disabled={!canSubmit || submitting}>
            {submitting ? 'Submitting...' : 'Submit Claim'}
          </button>
        </form>
      </div>
    </div>
  );
}


/* ── Mount — detect ?claim= URL param ── */
const claimMatch = window.location.search.match(/[?&]claim=([^&]+)/);
if (claimMatch) {
  ReactDOM.createRoot(document.getElementById('root')).render(<ClaimForm dealId={decodeURIComponent(claimMatch[1])} />);
} else {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
</script>
</body>
</html>
